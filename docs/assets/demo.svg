<svg xmlns="http://www.w3.org/2000/svg" width="750" height="520" viewBox="0 0 750 520">
  <style>
    @keyframes t1  { 0%,3%  { opacity:0 } 4%  { opacity:1 } }
    @keyframes t2  { 0%,8%  { opacity:0 } 9%  { opacity:1 } }
    @keyframes t3  { 0%,13% { opacity:0 } 14% { opacity:1 } }
    @keyframes t4  { 0%,20% { opacity:0 } 21% { opacity:1 } }
    @keyframes t5  { 0%,25% { opacity:0 } 26% { opacity:1 } }
    @keyframes t6  { 0%,32% { opacity:0 } 33% { opacity:1 } }
    @keyframes t7  { 0%,37% { opacity:0 } 38% { opacity:1 } }
    @keyframes t8  { 0%,44% { opacity:0 } 45% { opacity:1 } }
    @keyframes t9  { 0%,49% { opacity:0 } 50% { opacity:1 } }
    @keyframes t10 { 0%,56% { opacity:0 } 57% { opacity:1 } }
    @keyframes t11 { 0%,63% { opacity:0 } 64% { opacity:1 } }
    @keyframes t12 { 0%,70% { opacity:0 } 71% { opacity:1 } }
    @keyframes t13 { 0%,77% { opacity:0 } 78% { opacity:1 } }
    @keyframes t14 { 0%,84% { opacity:0 } 85% { opacity:1 } }
    @keyframes t15 { 0%,90% { opacity:0 } 91% { opacity:1 } }
    .l1  { opacity:0; animation: t1  25s infinite }
    .l2  { opacity:0; animation: t2  25s infinite }
    .l3  { opacity:0; animation: t3  25s infinite }
    .l4  { opacity:0; animation: t4  25s infinite }
    .l5  { opacity:0; animation: t5  25s infinite }
    .l6  { opacity:0; animation: t6  25s infinite }
    .l7  { opacity:0; animation: t7  25s infinite }
    .l8  { opacity:0; animation: t8  25s infinite }
    .l9  { opacity:0; animation: t9  25s infinite }
    .l10 { opacity:0; animation: t10 25s infinite }
    .l11 { opacity:0; animation: t11 25s infinite }
    .l12 { opacity:0; animation: t12 25s infinite }
    .l13 { opacity:0; animation: t13 25s infinite }
    .l14 { opacity:0; animation: t14 25s infinite }
    .l15 { opacity:0; animation: t15 25s infinite }
    text { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace; font-size: 13px; }
    .cmd  { fill: #c0c0c0; }
    .grn  { fill: #98c379; }
    .cyn  { fill: #56b6c2; }
    .ylw  { fill: #e5c07b; }
    .dim  { fill: #5c6370; }
    .wht  { fill: #abb2bf; }
    .bld  { fill: #e0e0e0; font-weight: 600; }
    .prompt { fill: #61afef; }
  </style>
  <!-- Terminal window -->
  <rect width="750" height="520" rx="8" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="750" height="32" rx="8" fill="#181825"/>
  <rect y="24" width="750" height="8" fill="#181825"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text x="375" y="20" text-anchor="middle" fill="#6c7086" font-size="12">heddle — bash</text>

  <!-- Line 1: validate -->
  <g class="l1">
    <text x="20" y="60"><tspan class="prompt">❯ </tspan><tspan class="grn">heddle validate</tspan><tspan class="cmd"> agents/prometheus-bridge.yaml</tspan></text>
  </g>
  <g class="l2">
    <text x="20" y="80"><tspan class="grn">✓ </tspan><tspan class="wht">Valid: prometheus-bridge v1.0.0 (5 tools, T1 observer)</tspan></text>
  </g>

  <!-- Line 2: run -->
  <g class="l3">
    <text x="20" y="112"><tspan class="prompt">❯ </tspan><tspan class="grn">heddle run</tspan><tspan class="cmd"> agents/prometheus-bridge.yaml --port 8200</tspan></text>
  </g>
  <g class="l4">
    <text x="20" y="132"><tspan class="cyn">▶ </tspan><tspan class="wht">MCP server heddle-prometheus-bridge on </tspan><tspan class="cyn">http://0.0.0.0:8200/mcp</tspan></text>
  </g>

  <!-- Line 3: generate -->
  <g class="l5">
    <text x="20" y="164"><tspan class="prompt">❯ </tspan><tspan class="grn">heddle generate</tspan><tspan class="ylw"> "agent that wraps the Gitea API"</tspan></text>
  </g>
  <g class="l6">
    <text x="20" y="184" class="dim">  Generating with qwen3:14b...</text>
  </g>
  <g class="l7">
    <text x="20" y="204"><tspan class="grn">✓ </tspan><tspan class="wht">Generated gitea-api-bridge.yaml (2 tools) in 20.3s</tspan></text>
  </g>

  <!-- Line 4: audit -->
  <g class="l8">
    <text x="20" y="236"><tspan class="prompt">❯ </tspan><tspan class="grn">heddle audit verify</tspan></text>
  </g>
  <g class="l9">
    <text x="20" y="256"><tspan class="grn">✓ </tspan><tspan class="wht">Chain valid: 599 entries</tspan></text>
  </g>

  <!-- Line 5: sign -->
  <g class="l10">
    <text x="20" y="288"><tspan class="prompt">❯ </tspan><tspan class="grn">heddle sign verify</tspan><tspan class="cmd"> agents/</tspan></text>
  </g>
  <g class="l11">
    <text x="20" y="308"><tspan class="grn">✓ </tspan><tspan class="wht">All 11 configs verified</tspan></text>
  </g>

  <!-- Line 6: sandbox -->
  <g class="l12">
    <text x="20" y="340"><tspan class="prompt">❯ </tspan><tspan class="grn">heddle sandbox</tspan><tspan class="cmd"> agents/intel-rag-bridge.yaml</tspan></text>
  </g>
  <g class="l13">
    <text x="20" y="360"><tspan class="wht">  Memory: </tspan><tspan class="cyn">512m</tspan><tspan class="wht">  CPU: </tspan><tspan class="cyn">0.5</tspan><tspan class="wht">  Network: </tspan><tspan class="cyn">bridge</tspan><tspan class="wht">  Read-only: </tspan><tspan class="grn">true</tspan></text>
  </g>

  <!-- Line 7: mesh -->
  <g class="l14">
    <text x="20" y="392"><tspan class="prompt">❯ </tspan><tspan class="grn">heddle mesh</tspan><tspan class="cmd"> agents/</tspan></text>
  </g>
  <g class="l15">
    <text x="20" y="412"><tspan class="cyn">▶ </tspan><tspan class="wht">Unified MCP server: </tspan><tspan class="bld">46 tools</tspan><tspan class="wht"> from </tspan><tspan class="bld">9 agents</tspan></text>
  </g>
  <g class="l15">
    <text x="40" y="432" class="dim">  intel-rag-bridge: 8 tools  prometheus-bridge: 5 tools</text>
  </g>
  <g class="l15">
    <text x="40" y="452" class="dim">  ai-platform: 8 tools  grafana-bridge: 5 tools</text>
  </g>
  <g class="l15">
    <text x="40" y="472" class="dim">  ollama-bridge: 4 tools  vram-orchestrator: 7 tools</text>
  </g>
  <g class="l15">
    <text x="40" y="492" class="dim">  daily-ops: 3 tools  gitea-api-bridge: 2 tools  rsshub-bridge: 4 tools</text>
  </g>
</svg>

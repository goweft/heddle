name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Validate agent configs
        run: |
          for config in agents/*.yaml; do
            echo "Validating $config..."
            loom validate "$config"
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: |
          python -m py_compile src/loom/cli.py
          python -m py_compile src/loom/config/schema.py
          python -m py_compile src/loom/config/loader.py
          python -m py_compile src/loom/mcp/server.py
          python -m py_compile src/loom/mcp/registry.py
          python -m py_compile src/loom/security/audit.py
          python -m py_compile src/loom/security/trust.py
          python -m py_compile src/loom/security/credentials.py
          python -m py_compile src/loom/security/validation.py
          python -m py_compile src/loom/security/signing.py
          python -m py_compile src/loom/security/sandbox.py

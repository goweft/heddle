<svg width="1280" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="0" width="680" height="280" rx="12" fill="#f8f7f4"/>
<g transform="translate(60, 40)">
  <!-- Warp threads approaching heddle from left -->
  <line x1="0" y1="30" x2="60" y2="30" stroke="#888780" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="55" x2="60" y2="55" stroke="#888780" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="80" x2="60" y2="80" stroke="#888780" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="105" x2="60" y2="105" stroke="#888780" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="130" x2="60" y2="130" stroke="#888780" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="155" x2="60" y2="155" stroke="#888780" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="180" x2="60" y2="180" stroke="#888780" stroke-width="1.5" opacity="0.5"/>

  <!-- Heddle frame — the policy gate -->
  <rect x="60" y="5" width="24" height="200" rx="3" fill="none" stroke="#378ADD" stroke-width="2" opacity="0.7"/>
  <!-- Heddle eyes (slots where threads pass through) -->
  <ellipse cx="72" cy="30" rx="8" ry="5" fill="none" stroke="#378ADD" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="72" cy="55" rx="8" ry="5" fill="none" stroke="#378ADD" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="72" cy="80" rx="8" ry="5" fill="none" stroke="#378ADD" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="72" cy="105" rx="8" ry="5" fill="none" stroke="#378ADD" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="72" cy="130" rx="8" ry="5" fill="none" stroke="#378ADD" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="72" cy="155" rx="8" ry="5" fill="none" stroke="#378ADD" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="72" cy="180" rx="8" ry="5" fill="none" stroke="#378ADD" stroke-width="1.2" opacity="0.6"/>

  <!-- Threads after heddle — sorted into raised (trusted) and lowered (restricted) -->
  <!-- Trusted threads rise — green -->
  <line x1="84" y1="30" x2="180" y2="15" stroke="#1D9E75" stroke-width="1.5" opacity="0.8"/>
  <line x1="84" y1="80" x2="180" y2="55" stroke="#1D9E75" stroke-width="1.5" opacity="0.8"/>
  <line x1="84" y1="130" x2="180" y2="95" stroke="#1D9E75" stroke-width="1.5" opacity="0.8"/>
  <line x1="84" y1="180" x2="180" y2="135" stroke="#1D9E75" stroke-width="1.5" opacity="0.8"/>
  <!-- Restricted threads descend — amber -->
  <line x1="84" y1="55" x2="180" y2="160" stroke="#BA7517" stroke-width="1.5" opacity="0.5"/>
  <line x1="84" y1="105" x2="180" y2="175" stroke="#BA7517" stroke-width="1.5" opacity="0.5"/>
  <line x1="84" y1="155" x2="180" y2="190" stroke="#BA7517" stroke-width="1.5" opacity="0.5"/>

  <!-- Small lock icon on heddle frame -->
  <rect x="66" y="96" width="12" height="9" rx="2" fill="none" stroke="#378ADD" stroke-width="1.2"/>
  <path d="M69 96V93a3 3 0 0 1 6 0v3" fill="none" stroke="#378ADD" stroke-width="1.2"/>
</g>

<!-- Typography -->
<text x="280" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="500" fill="#2c2c2a" letter-spacing="-1">heddle</text>
<text x="280" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="#5f5e5a">policy-and-trust layer for MCP tool servers</text>

<text x="280" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#888780">separates and guides every thread through the loom</text>
<text x="280" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#888780">trust enforcement, credential brokering, audit logging</text>

<rect x="280" y="222" width="56" height="22" rx="4" fill="#f1efe8" stroke="#d3d1c7" stroke-width="0.5"/>
<text x="308" y="237" font-family="monospace" font-size="10" font-weight="400" fill="#888780" text-anchor="middle">goweft</text>
</svg>